<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Registration - Mortic</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .card-solo { border-radius: 1rem; border: none; }
        .btn-pay { border-radius: 0.5rem; font-weight: 600; padding: 0.8rem; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <!-- Solo Plan Card -->
            <div class="card card-solo shadow-lg">
                <div class="card-header bg-primary text-white text-center py-4" style="border-radius: 1rem 1rem 0 0;">
                    <h2 class="fw-bold mb-0">Solo Plan</h2>
                    <p class="mb-0 opacity-75">Individual Premium Access</p>
                </div>

                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <h1 class="display-4 fw-bold text-primary">₱125</h1>
                        <p class="text-muted">One-time payment via GCash</p>
                    </div>

                    <ul class="list-unstyled mb-4">
                        <li class="mb-2"><i class="bi bi-check-circle-fill text-success me-2"></i> Single Member Coverage</li>
                        <li class="mb-2"><i class="bi bi-check-circle-fill text-success me-2"></i> Custom Premium Badge</li>
                        <li class="mb-2"><i class="bi bi-check-circle-fill text-success me-2"></i> Ad-free experience</li>
                    </ul>

                    <!-- Payment Form -->
                    <form action="{% url 'payments:process_payment' %}" method="POST" id="soloForm">
                        {% csrf_token %}
                        <input type="hidden" name="plan_choice" value="Solo">

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Account Email</label>
                            <input type="email" class="form-control bg-light" value="{{ user.email }}" readonly>
                        </div>

                        <button type="submit" class="btn btn-primary btn-pay w-100 shadow-sm">
                            <i class="bi bi-wallet2 me-2"></i> Pay with GCash
                        </button>
                    </form>
                </div>

                <div class="card-footer bg-white border-0 text-center pb-4">
                    <a href="{% url 'payments:mortuary' %}" class="text-decoration-none small text-muted">
                        <i class="bi bi-arrow-left"></i> View other plans
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Loading state logic for the button
    document.getElementById('soloForm').onsubmit = function() {
        const btn = this.querySelector('button');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Connecting...';
    };
</script>

</body>
</html>
