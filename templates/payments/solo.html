{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
                    <h2 class="fw-bold mb-0">Solo Registration</h2>
                    <p class="mb-0 opacity-75">Individual Premium Access</p>
                </div>
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h1 class="display-4 fw-bold text-primary">₱500</h1>
                        <p class="text-muted">One-time payment via GCash</p>
                    </div>

                    <ul class="list-unstyled mb-4">
                        <li class="mb-2"><i class="bi bi-check-circle-fill text-success me-2"></i> Full access to Mortic features</li>
                        <li class="mb-2"><i class="bi bi-check-circle-fill text-success me-2"></i> Custom Premium Badge</li>
                        <li class="mb-2"><i class="bi bi-check-circle-fill text-success me-2"></i> Ad-free experience</li>
                    </ul>

                    <!-- Registration Form -->
                    <form action="{% url 'payments:checkout' %}" method="POST" id="soloForm">
                        {% csrf_token %}
                        <input type="hidden" name="plan_choice" value="Solo">
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Account Email</label>
                            <input type="email" class="form-control bg-light" value="{{ user.email }}" readonly>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold py-3 shadow-sm">
                            Pay with GCash
                        </button>
                    </form>
                </div>
                <div class="card-footer bg-white border-0 text-center pb-4">
                    <a href="{% url 'payments:payments' %}" class="text-decoration-none small text-muted">
                        <i class="bi bi-arrow-left"></i> View other plans
                    </a>
                </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('soloForm').onsubmit = function() {
        const btn = this.querySelector('button');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Connecting to GCash...';
    };
</script>
{% endblock %}
