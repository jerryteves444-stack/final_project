<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Animation CSS -->
<style>
body {
    background: linear-gradient(135deg, #0d6efd, #6610f2);
}

/* Fade in animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Card animation */
.animated-card {
    animation: fadeIn 0.8s ease-in-out;
    transition: 0.3s ease;
}

/* Hover effect */
.animated-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* Input focus animation */
.form-control:focus {
    transform: scale(1.02);
    transition: 0.2s;
    box-shadow: 0 0 10px rgba(13,110,253,0.5);
}

/* Password Requirement Helper Text */
.password-hint {
    font-size: 0.75rem;
    color: #6c757d;
    margin-top: 4px;
}
</style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-12 col-sm-10 col-md-8 col-lg-5">

            <div class="card shadow-lg animated-card">

                <div class="card-body p-4">

                    <h3 class="text-center mb-2">Create Account</h3>

                    <!-- Logged in user -->
                    {% if request.user.is_authenticated %}
                        <p class="text-center">
                            <span class="badge bg-dark">
                                Logged in as: {{ request.user.username }}
                            </span>
                        </p>
                    {% endif %}

                    <!-- Messages -->
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" name="first_name" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Middle Name</label>
                                <input type="text" name="middle_name" class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="last_name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <!-- DATE OF BIRTH (BAG-ONG DUGANG) -->
                        <div class="mb-3">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" name="birthdate" class="form-control" required>
                        </div>

                        <!-- Password with Strength Requirement -->
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control"
                                   required
                                   pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                   title="Must contain at least 8 characters, including 1 uppercase letter and 1 number.">
                            <div class="password-hint">At least 8 characters, 1 uppercase, and 1 number.</div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="password_confirm" id="password_confirm" class="form-control" required>
                        </div>

                        <!-- Gender -->
                        <div class="mb-3">
                            <label class="form-label d-block">Gender</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" value="Male" required>
                                <label class="form-check-label">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" value="Female">
                                <label class="form-check-label">Female</label>
                            </div>
                        </div>

                        <!-- Type -->
                        <div class="mb-3">
                            <label class="form-label">Circute</label>
                            <select name="type" class="form-select" required>
                                <option value="" disabled selected>Select type...</option>
                                <option value="Sunlight">Sunlight</option>
                                <option value="Starlight">Starlight</option>
                                <option value="Alpha">Alpha</option>
                                <option value="Omega">Omega</option>
                            </select>
                        </div>

                        <!-- Address -->
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea name="address" class="form-control" rows="2" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
                            Register
                        </button>
                    </form>

                    <p class="text-center mt-3 small text-muted">
                        Already have an account?
                        <a href="/accounts/login/" class="text-decoration-none fw-bold">Login</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Simple JS to check password matching before submit (Optional) -->
<script>
    (() => {
        'use strict'
        const forms = document.querySelectorAll('.needs-validation')
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                const password = document.getElementById('password')
                const confirm = document.getElementById('password_confirm')

                if (!form.checkValidity() || password.value !== confirm.value) {
                    if (password.value !== confirm.value) {
                        confirm.setCustomValidity('Passwords do not match')
                        alert("Passwords don't match!");
                    } else {
                        confirm.setCustomValidity('')
                    }
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>

</body>
</html>
