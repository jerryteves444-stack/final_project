<!DOCTYPE html>
{% load static %}
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="col-md-4 mx-auto">
    <div class="text-center mb-4">
       <img src="{% static 'accounts/mortic.png' %}" alt="MORTIC Logo" width="300">
    </div>

    <h3 class="text-center mb-3 text-dark">Login</h3>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger py-2 px-3 border-0 shadow-sm mb-3 text-center small" role="alert">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
        <button class="btn btn-primary w-100 mb-3">Login</button>
    </form>

    <div class="d-flex justify-content-between mt-3">
        <a href="{% url 'password_reset' %}" class="text-primary text-decoration-none">
            Forgot Password?
        </a>

        <a href="{% url 'register' %}" class="text-primary text-decoration-none fw-semibold">
            Sign Up
        </a>
    </div>

  </div>

</div>

</body>
</html>
